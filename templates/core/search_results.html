{% extends 'core/navbar.html' %}

{% block content %}
<div class="container mt-4">
    <h2 class="mb-4">Search Results for "{{ query }}"</h2>
    {% if items %}
        <div class="row">
            {% for item in items %}
                <div class="col-md-4 mb-4">
                    <div class="card h-100">
                        {% if item.image %}
                            <img src="{{ item.image.url }}" class="card-img-top" alt="{{ item.title }}" style="height: 200px; object-fit: cover;">
                        {% endif %}
                        <div class="card-body text-center">
                            <h5 class="card-title">{{ item.title }}</h5>
                            <p class="card-text">₦{{ item.price }}</p>
                        </div>
                        <div class="card-footer bg-white border-top-0">
                            <div class="d-flex flex-column align-items-center gap-2">
                                <a href="{% url 'core:item_detail' item.id %}" class="btn btn-primary w-100">View Product</a>
                                <button 
                                    data-product="{{ item.id }}" 
                                    data-action="add" 
                                    class="btn btn-outline-secondary w-100 update-cart">
                                    Add To Cart
                                </button>
                                <a href="{% url 'core:cart' %}" class="btn btn-success w-100">Buy Now</a>
                            </div>
                        </div>
                    </div>
                </div>
            {% endfor %}
        </div>
    {% else %}
        <p>No items found.</p>
    {% endif %}
</div>
{% endblock %}
