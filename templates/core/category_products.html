{% extends 'core/navbar.html' %}

{% block content %}
<div class="container mt-4">
    <h2 class="mb-4">Products in {{ category.name }}</h2>

    {% if items %}
        <div class="row">
            {% for item in items %}
            <div class="col-md-4 mb-4">
                <div class="card h-100">
                    {% if item.image %}
                    <img src="{{ item.image.url }}" class="card-img-top" alt="{{ item.title }}">
                    {% endif %}
                    <div class="card-body">
                        <h5 class="card-title">{{ item.title }}</h5>
                        <p class="card-text">${{ item.price }}</p>
                        <a href="{% url 'core:item_detail' item.id %}" class="btn btn-primary">View</a>
                        <button data-product="{{ item.id }}" data-action="add" class="btn btn-outline-secondary option1 update-cart">Add to Cart</button>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    {% else %}
        <p>No products found in this category.</p>
    {% endif %}
</div>
{% endblock %}
